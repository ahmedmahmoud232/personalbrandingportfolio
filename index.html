                          flex: isActive ? '3.5 1 0%' : '0.6 1 0%',
                          background: tab.accentColor,
                          border: isActive ? `1px solid ${tab.borderColor}` : '1px solid rgba(0, 0, 0, 0.05)',
                          borderRadius: '32px',
                          padding: '32px',
                          transition: 'all 0.75s cubic-bezier(0.34, 1.56, 0.64, 1)',
                          boxShadow: isActive ? '0 20px 40px rgba(0,0,0,0.02)' : 'none',
                          overflow: 'hidden',
                          cursor: isActive ? 'default' : 'pointer'
                        }}
                      >
                        {!isActive ? (
                          /* Collapsed Card Content (Horizontal Logo Rotated 90 degrees vertically) */
                          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100%', zIndex: 1, pointerEvents: 'none', animation: 'fadeIn 0.4s' }}>
                            <img
                              src={tab.logo}
                              alt=""
                              style={{
                                width: '100px',
                                height: 'auto',
                                objectFit: 'contain',
                                transform: 'rotate(-90deg)',
                                opacity: 0.65
                              }}
                            />
                          </div>
                        ) : (
                          /* Expanded Card Content with active animation class */
                          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', width: '100%', zIndex: 1, animation: 'fadeIn 0.5s' }}>
                            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', marginBottom: '32px' }}>
                              <img src={tab.logo} alt="" style={{ height: '70px', width: 'auto', objectFit: 'contain', marginBottom: '16px' }} />
                              <h3 style={{ fontSize: '24px', fontWeight: '800', color: '#0a0a0f', margin: 0, textAlign: 'center', letterSpacing: '-0.02em' }}>
                                {tab.title}
                              </h3>
                            </div>

                            {/* Carousel content box with stacked layered background cards */}
                            <div style={{ position: 'relative', width: '100%', maxWidth: '440px', margin: '0 auto', zIndex: 1 }}>
                              {/* Stacked Layer 3 (deepest) */}
                              <div style={{ position: 'absolute', bottom: '-12px', left: '16px', right: '16px', height: '24px', background: '#ffffff', border: '1px solid rgba(0, 0, 0, 0.05)', borderRadius: '24px', zIndex: -3, boxShadow: '0 4px 15px rgba(0,0,0,0.01)' }} />
                              {/* Stacked Layer 2 */}
                              <div style={{ position: 'absolute', bottom: '-6px', left: '8px', right: '8px', height: '24px', background: '#ffffff', border: '1px solid rgba(0, 0, 0, 0.05)', borderRadius: '24px', zIndex: -2, boxShadow: '0 4px 15px rgba(0,0,0,0.01)' }} />

                              {/* Main Carousel Card Layer 1 */}
                              <div style={{
                                background: '#ffffff',
                                border: '1px solid rgba(0, 0, 0, 0.08)',
                                borderRadius: '24px',
                                padding: '28px 24px',
                                textAlign: 'center',
                                boxShadow: '0 8px 30px rgba(0,0,0,0.02)',
                                position: 'relative',
                                zIndex: 1
                              }}>
                                <h4 style={{ fontSize: '18px', fontWeight: '800', color: '#0a0a0f', marginBottom: '10px', letterSpacing: '-0.019em' }}>
                                  {tab.slides[slideIndices[tab.id]].title}
                                </h4>
                                <p style={{ fontSize: '14.5px', color: '#4b5563', lineHeight: '1.6', margin: 0, fontWeight: '500' }}>
                                  {tab.slides[slideIndices[tab.id]].description}
                                </p>
                              </div>

                              {/* Stacked Left Arrow */}
                              <button
                                className="calendar-btn-nav"
                                onClick={() => handlePrevSlide(tab.id, tab.slides.length)}
                                style={{
                                  position: 'absolute',
                                  left: '-20px',
                                  top: '50%',
                                  transform: 'translateY(-50%)',
                                  zIndex: 5,
                                  background: '#ffffff',
                                  border: '1px solid #e5e7eb',
                                  borderRadius: '12px',
                                  width: '40px',
                                  height: '40px',
                                  display: 'flex',
                                  alignItems: 'center',
                                  justifyContent: 'center',
                                  cursor: 'pointer',
                                  transition: 'all 0.2s',
                                  boxShadow: '0 4px 12px rgba(0,0,0,0.05)',
                                  color: '#000000',
                                  fontWeight: 'bold',
                                  fontSize: '18px'
                                }}
                                onMouseEnter={e => e.currentTarget.style.borderColor = '#f43f5e'}
                                onMouseLeave={e => e.currentTarget.style.borderColor = '#e5e7eb'}
                              >
                                <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                              </button>

                              {/* Stacked Right Arrow */}
                              <button
                                className="calendar-btn-nav"
                                onClick={() => handleNextSlide(tab.id, tab.slides.length)}
                                style={{
                                  position: 'absolute',
                                  right: '-20px',
                                  top: '50%',
                                  transform: 'translateY(-50%)',
                                  zIndex: 5,
                                  background: '#ffffff',
                                  border: '1px solid #e5e7eb',
                                  borderRadius: '12px',
                                  width: '40px',
                                  height: '40px',
                                  display: 'flex',
                                  alignItems: 'center',
                                  justifyContent: 'center',
                                  cursor: 'pointer',
                                  transition: 'all 0.2s',
                                  boxShadow: '0 4px 12px rgba(0,0,0,0.05)',
                                  color: '#000000',
                                  fontWeight: 'bold',
                                  fontSize: '18px'
                                }}
                                onMouseEnter={e => e.currentTarget.style.borderColor = '#f43f5e'}
                                onMouseLeave={e => e.currentTarget.style.borderColor = '#e5e7eb'}
                              >
                                <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                              </button>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        </section>
      );
    };

    /* ─── SERVICES ─── */
    const Services = () => {
      const [selectedService, setSelectedService] = useState(null);
      const [formData, setFormData] = useState({ email: '', desc: '' });
      const [showSuccess, setShowSuccess] = useState(false);
      const [hoveredIndex, setHoveredIndex] = useState(null);
      const [isPopDropdownOpen, setIsPopDropdownOpen] = useState(false);

      const items = [
        {
          icon: "images/3dicons-folder-fav-front-color.png",
          title: "Brand & Niche Strategy",
          desc: "We study your research field, analyze competitors, and identify the unique niche preferred by your target audience.",
          btnText: "Get Detailed Brand Direction Document",
          bgGradient: "linear-gradient(to bottom, rgba(244, 63, 94, 0.06) 0%, #ffffff 100%)",
          iconBorder: "1px solid rgba(244, 63, 94, 0.35)",
          hoverBorder: "rgba(244, 63, 94, 0.3)"
        },
        {
          icon: "images/3dicons-youtube-front-color.png",
          title: "Scriptwriting & Hook Eng.",
          desc: "We write long-form and short-form scripts, psychologically designed to capture attention and convert passive viewers into potential customers.",
          btnText: "Get Content Strategy & Video Ideas",
          bgGradient: "linear-gradient(to bottom, rgba(244, 63, 94, 0.06) 0%, #ffffff 100%)",
          iconBorder: "1px solid rgba(244, 63, 94, 0.35)",
          hoverBorder: "rgba(244, 63, 94, 0.3)"
        },
        {
          icon: "images/3dicons-video-cam-front-color.png",
          title: "Post-Production & Editing",
          desc: "We edit videos in a style that maximizes viewer retention while maintaining your brand's professional visual identity.",
          btnText: "Get Edited Videos & Visual Assets",
          bgGradient: "linear-gradient(to bottom, rgba(244, 63, 94, 0.06) 0%, #ffffff 100%)",
          iconBorder: "1px solid rgba(244, 63, 94, 0.35)",
          hoverBorder: "rgba(244, 63, 94, 0.3)"
        }
      ];

      const handleSend = (e) => {
        e.preventDefault();
        if (!selectedService || !formData.email) return;
        const subject = encodeURIComponent(`New ${selectedService.title} Project`);
        const body = encodeURIComponent(`Email: ${formData.email}\n\nProject Description:\n${formData.desc}`);
        window.location.href = `mailto:ahmedmahmoud22990@gmail.com?subject=${subject}&body=${body}`;

        setShowSuccess(true);
        setTimeout(() => {
          setShowSuccess(false);
          setSelectedService(null);
          setFormData({ email: '', desc: '' });
        }, 3000);
      };

      return (
        <section id="services" style={{ position: 'relative', overflow: 'hidden' }}>
          {/* Dot grid background */}
          <div className="services-grid-bg" style={{
            position: 'absolute',
            inset: 0,
            backgroundImage: 'radial-gradient(rgba(10, 10, 15, 0.12) 1.5px, transparent 1.5px)',
            backgroundSize: '32px 32px',
            zIndex: 0,
            opacity: 0.8,
            pointerEvents: 'none'
          }} />
          <div className="services-inner" style={{ position: 'relative', zIndex: 1 }}>
            <R>
              <div style={{ display: 'flex', justifyContent: 'center', marginBottom: '20px' }}>
                <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', border: '1px solid rgba(0, 0, 0, 0.12)', borderRadius: '100px', padding: '6px 16px', fontSize: '13px', fontWeight: '500', color: '#0a0a0f', background: 'transparent' }}>
                  Services
                </span>
              </div>
            </R>
            <R d={50}>
              <h2 className="section-h2" style={{ fontSize: 'clamp(24px, 3vw, 36px)', fontWeight: '700', marginTop: '0', marginBottom: '12px', color: '#0a0a0f', letterSpacing: '-0.02em', textAlign: 'center' }}>How I Can Help You Grow</h2>
            </R>
            <R d={75}>
              <p style={{ fontSize: '14px', color: '#4b5563', marginBottom: '48px', fontWeight: '500', letterSpacing: '-0.01em', textAlign: 'center' }}>Tailored branding, script writing, and asset design to scale your digital presence.</p>
            </R>
            <div className="srv-grid">
              {items.map((s, i) => (
                <R key={i} d={i * 80}>
                  <div
                    className="srv-card-wrap"
                    style={{ height: '100%' }}
                    onMouseEnter={() => setHoveredIndex(i)}
                    onMouseLeave={() => setHoveredIndex(null)}
                  >
                    <div className="srv-card-inner" style={{
                      height: '100%',
                      background: s.bgGradient,
                      padding: '40px 32px',
                      borderRadius: '32px',
                      display: 'flex',
                      flexDirection: 'column',
                      alignItems: 'flex-start',
                      textAlign: 'left',
                      justifyContent: 'flex-start',
                      boxShadow: hoveredIndex === i ? '0 20px 40px rgba(0, 0, 0, 0.05)' : '0 20px 40px rgba(0, 0, 0, 0.02)',
                      border: '1px solid rgba(0, 0, 0, 0.05)',
                      position: 'relative',
                      overflow: 'hidden',
                      transform: hoveredIndex === i ? 'translateY(-6px)' : 'none',
                      transition: 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s, border-color 0.3s'
                    }}>
                      {/* Highlight border line overlay with card's primary color with opacity */}
                      <div style={{
                        position: 'absolute',
                        inset: 0,
                        borderRadius: '32px',
                        border: `1px solid ${s.hoverBorder}`,
                        opacity: hoveredIndex === i ? 1 : 0,
                        transition: 'opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1)',
                        pointerEvents: 'none',
                        zIndex: 3
                      }} />
                      <div className="srv-icon-wrap" style={{
                        width: '64px',
                        height: '64px',
                        borderRadius: '50%',
                        background: '#ffffff',
                        border: s.iconBorder,
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        marginBottom: '28px'
                      }}>
                        <img src={s.icon} alt="" style={{ width: '32px', height: '32px', objectFit: 'contain' }} />
                      </div>
                      <div className="srv-title" style={{ fontSize: '20px', fontWeight: '800', marginBottom: '12px', color: '#0a0a0f', letterSpacing: '-0.02em' }}>{s.title}</div>
                      <div className="srv-desc" style={{ fontSize: '14.5px', lineHeight: '1.6', color: '#374151', marginBottom: '32px', flexGrow: 1 }}>{s.desc}</div>
                      <button
                        className="btn-ghost"
                        style={{
                          width: '100%',
                          justifyContent: 'center',
                          marginTop: 'auto',
                          zIndex: 4
                        }}
                        onClick={() => setSelectedService(s)}
                      >
                        {s.btnText}
                      </button>
                    </div>
                  </div>
                </R>
              ))}
            </div>
          </div>

          {selectedService && (
            <div className="popup-overlay" onClick={() => { setSelectedService(null); setIsPopDropdownOpen(false); }}>
              <div className="popup-content" style={{
                background: '#ffffff',
                border: '1px solid rgba(0, 0, 0, 0.08)',
                borderRadius: '24px',
                padding: '36px',
                width: '100%',
                maxWidth: '480px',
                boxShadow: '0 24px 60px rgba(0,0,0,0.08)',
                position: 'relative',
                transform: 'translateY(20px)',
                animation: 'slideUp 0.3s forwards',
                color: '#0a0a0f'
              }} onClick={e => e.stopPropagation()}>
                {showSuccess ? (
                  <div style={{ textAlign: 'center', padding: '40px 0', animation: 'fadeIn 0.3s' }}>
                    <div style={{ width: '64px', height: '64px', borderRadius: '50%', background: '#22c55e20', color: '#22c55e', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 24px' }}>
                      <svg width="32" height="32" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" /></svg>
                    </div>
                    <h3 style={{ fontSize: '24px', fontWeight: 800, marginBottom: '8px', color: '#0a0a0f' }}>Request Sent!</h3>
                    <p style={{ color: '#6b7280' }}>Opening your email client...</p>
                  </div>
                ) : (
                  <form onSubmit={handleSend} style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
                    <h3 style={{ fontSize: '22px', fontWeight: 800, letterSpacing: '-0.02em', color: '#0a0a0f' }}>Start a Project</h3>

                    <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                      <label style={{ fontSize: '11px', fontWeight: '800', textTransform: 'uppercase', letterSpacing: '0.05em', color: '#6b7280' }}>Select Service</label>
                      <div style={{ position: 'relative' }}>
                        <div
                          className="dark-input"
                          style={{ cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: '#ffffff', border: '1px solid #e5e7eb' }}
                          onClick={() => setIsPopDropdownOpen(!isPopDropdownOpen)}
                        >
                          <span style={{ color: selectedService ? '#0a0a0f' : '#9ca3af', fontWeight: '600' }}>
                            {selectedService ? selectedService.title : 'Select a service...'}
                          </span>
                          <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24" style={{ transform: isPopDropdownOpen ? 'rotate(180deg)' : 'none', transition: 'transform 0.2s', color: '#6b7280' }}>
                            <polyline points="6 9 12 15 18 9" />
                          </svg>
                        </div>

                        {isPopDropdownOpen && (
                          <div style={{
                            position: 'absolute', top: '100%', left: 0, right: 0, marginTop: '8px',
                            background: 'white', border: '1px solid #e5e7eb', borderRadius: '12px',
                            boxShadow: '0 10px 30px rgba(0,0,0,0.08)', zIndex: 10, padding: '8px 0',
                            animation: 'fadeIn 0.2s ease'
                          }}>
                            {items.map(o => (
                              <div
                                key={o.title}
                                style={{ padding: '12px 16px', cursor: 'pointer', fontSize: '14px', color: '#0a0a0f', transition: 'background 0.2s', fontWeight: '600' }}
                                onMouseEnter={e => e.target.style.background = '#f4f6fb'}
                                onMouseLeave={e => e.target.style.background = 'transparent'}
                                onClick={() => { setSelectedService(o); setIsPopDropdownOpen(false); }}
                              >
                                {o.title}
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>

                    <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                      <label style={{ fontSize: '11px', fontWeight: '800', textTransform: 'uppercase', letterSpacing: '0.05em', color: '#6b7280' }}>Email Address</label>
                      <input
                        className="dark-input"
                        style={{ border: '1px solid #e5e7eb', background: '#ffffff', borderRadius: '10px', height: '42px', padding: '0 12px', fontSize: '14px', color: '#0a0a0f' }}
                        type="email"
                        required
                        placeholder="your@email.com"
                        value={formData.email}
                        onChange={e => setFormData({ ...formData, email: e.target.value })}
                      />
                    </div>

                    <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                      <label style={{ fontSize: '11px', fontWeight: '800', textTransform: 'uppercase', letterSpacing: '0.05em', color: '#6b7280' }}>Small Description</label>
                      <textarea
                        className="dark-input"
                        style={{ border: '1px solid #e5e7eb', background: '#ffffff', borderRadius: '10px', minHeight: '100px', padding: '12px', fontSize: '14px', resize: 'vertical', color: '#0a0a0f' }}
                        required
                        placeholder="Tell me a bit about your project..."
                        value={formData.desc}
                        onChange={e => setFormData({ ...formData, desc: e.target.value })}
                      />
                    </div>

                    <div style={{ display: 'flex', gap: '12px', marginTop: '8px' }}>
                      <button type="submit" className="btn-primary" style={{ flex: 1, justifyContent: 'center' }}>Let's create it</button>
                      <button type="button" className="btn-ghost" style={{ padding: '0 24px' }} onClick={() => { setSelectedService(null); setIsPopDropdownOpen(false); }}>Cancel</button>
                    </div>
                  </form>
                )}
              </div>
            </div>
          )}
        </section>
      );
    };

    /* ─── CONTACT ─── */
    const Contact = () => {
      const [service, setService] = useState('');
      const [isDropdownOpen, setIsDropdownOpen] = useState(false);

      const serviceOptions = [
        { value: 'youtube', label: 'YouTube branding' },
        { value: 'carousels', label: 'LinkedIn/X carousels' },
        { value: 'identity', label: 'Personal identity kits' },
        { value: 'another', label: 'Another service' }
      ];

      const selectedOption = serviceOptions.find(o => o.value === service);

      return (
        <section id="contact" style={{ position: 'relative', overflow: 'hidden', padding: '60px 24px' }}>
          <div className="contact-grid-bg"></div>
          <div className="contact-wrap projects-inner" style={{ position: 'relative', zIndex: 1, padding: 0 }}>
            <R>
              <div style={{ display: 'flex', justifyContent: 'center', marginBottom: '20px' }}>
                <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', border: '1px solid rgba(0, 0, 0, 0.12)', borderRadius: '100px', padding: '6px 16px', fontSize: '13px', fontWeight: '500', color: '#0a0a0f', background: 'transparent' }}>
                  Contact Us
                </span>
              </div>
            </R>
            <R d={50}>
              <h2 className="section-h2" style={{ fontSize: 'clamp(24px, 3vw, 36px)', fontWeight: '700', marginTop: '0', marginBottom: '12px', color: '#0a0a0f', letterSpacing: '-0.02em', textAlign: 'center' }}>Let's build something remarkable</h2>
            </R>
            <R d={75}>
              <p style={{ fontSize: '14px', color: '#4b5563', marginBottom: '48px', fontWeight: '500', letterSpacing: '-0.01em', textAlign: 'center' }}>Have a product idea, a redesign challenge, or just want to say hello? I respond within 24 hours.</p>
            </R>

            <div>
              <div
                className="contact-form-card"
                style={{
                  position: 'relative',
                  background: 'linear-gradient(to bottom, rgba(244, 63, 94, 0.06) 0%, #ffffff 100%)',
                  border: '1px solid rgba(0, 0, 0, 0.05)',
                  borderRadius: '32px',
                  padding: '40px 32px',
                  boxShadow: '0 20px 40px rgba(0, 0, 0, 0.02)',
                  color: '#0a0a0f',
                  maxWidth: '1104px',
                  margin: '0 auto',
                  width: '100%'
                }}
              >
                <div className="dark-form" style={{ background: 'transparent', padding: 0, border: 'none', boxShadow: 'none' }}>
                  <div className="dark-frow">
                    <div>
                      <label className="dark-label" style={{ fontSize: '14px', fontWeight: '400', textTransform: 'none', color: '#374151', marginBottom: '8px', display: 'block', letterSpacing: 'normal' }}>Your name</label>
                      <input className="dark-input" type="text" placeholder="John Doe" style={{ border: '1px solid #e5e7eb', background: '#ffffff', borderRadius: '10px', height: '42px', padding: '0 12px', fontSize: '14px', color: '#0a0a0f', width: '100%' }} />
                    </div>
                    <div>
                      <label className="dark-label" style={{ fontSize: '14px', fontWeight: '400', textTransform: 'none', color: '#374151', marginBottom: '8px', display: 'block', letterSpacing: 'normal' }}>Email</label>
                      <input className="dark-input" type="email" placeholder="john@company.com" style={{ border: '1px solid #e5e7eb', background: '#ffffff', borderRadius: '10px', height: '42px', padding: '0 12px', fontSize: '14px', color: '#0a0a0f', width: '100%' }} />
                    </div>
                  </div>

                  <div style={{ marginBottom: '16px' }}>
                    <label className="dark-label" style={{ fontSize: '14px', fontWeight: '400', textTransform: 'none', color: '#374151', marginBottom: '8px', display: 'block', letterSpacing: 'normal' }}>Select service</label>
                    <div style={{ position: 'relative' }}>
                      <div
                        className="dark-input"
                        style={{ cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center', border: '1px solid #e5e7eb', background: '#ffffff', borderRadius: '10px', height: '42px', padding: '0 12px', fontSize: '14px', color: '#0a0a0f' }}
                        onClick={() => setIsDropdownOpen(!isDropdownOpen)}
                      >
                        <span style={{ color: selectedOption ? '#0a0a0f' : '#9ca3af', fontWeight: '600' }}>
                          {selectedOption ? selectedOption.label : 'Select a service...'}
                        </span>
                        <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24" style={{ transform: isDropdownOpen ? 'rotate(180deg)' : 'none', transition: 'transform 0.2s', color: '#6b7280' }}>
                          <polyline points="6 9 12 15 18 9" />
                        </svg>
                      </div>

                      {isDropdownOpen && (
                        <div style={{
                          position: 'absolute', top: '100%', left: 0, right: 0, marginTop: '8px',
                          background: 'white', border: '1px solid #e5e7eb', borderRadius: '12px',
                          boxShadow: '0 10px 30px rgba(0,0,0,0.08)', zIndex: 10, padding: '8px 0',
                          animation: 'fadeIn 0.2s ease'
                        }}>
                          {serviceOptions.map(o => (
                            <div
                              key={o.value}
                              style={{ padding: '12px 16px', cursor: 'pointer', fontSize: '14px', color: '#0a0a0f', transition: 'background 0.2s', fontWeight: '600' }}
                              onMouseEnter={e => e.target.style.background = '#f4f6fb'}
                              onMouseLeave={e => e.target.style.background = 'transparent'}
                              onClick={() => { setService(o.value); setIsDropdownOpen(false); }}
                            >
                              {o.label}
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>

                  {service === 'another' && (

          let currentId = 'home';
          const ids = ['home', 'about', 'projects', 'contact'];
          for (let i = ids.length - 1; i >= 0; i--) {

              currentId = ids[i];
              break;

        handleScroll();

    /* ─── FLOATING FIGMA LOGOS ─── */

    /* ─── SCROLL TO TOP ─── */

      useEffect(() => {
        const toggleVisibility = () => {
          if (window.scrollY > 400) {
            setVisible(true);
          } else {
            setVisible(false);
          }
        };
        window.addEventListener('scroll', toggleVisibility);
        return () => window.removeEventListener('scroll', toggleVisibility);
      }, []);

      const scrollToTop = () => {
        window.scrollTo({
          top: 0,
          behavior: 'smooth'
        });

          </svg>

    /* ─── CALENDAR WIDGET ─── */
    const Calendar = ({ onSelectSlot }) => {
      const today = new Date();
      const [currentMonth, setCurrentMonth] = useState(today.getMonth());
      const [currentYear, setCurrentYear] = useState(today.getFullYear());
      const [selectedDate, setSelectedDate] = useState(null);
      const [selectedSlot, setSelectedSlot] = useState(null);

      const months = [
        'January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December'
      ];

      const daysOfWeek = ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'];

      const getDaysInMonth = (month, year) => {
        return new Date(year, month + 1, 0).getDate();
      };

      const getFirstDayIndex = (month, year) => {
        return new Date(year, month, 1).getDay();
      };

      const daysInMonth = getDaysInMonth(currentMonth, currentYear);
      const firstDayIndex = getFirstDayIndex(currentMonth, currentYear);

      const handlePrevMonth = () => {
        if (currentMonth === 0) {
          setCurrentMonth(11);
          setCurrentYear(currentYear - 1);
        } else {
          setCurrentMonth(currentMonth - 1);
        }
        setSelectedDate(null);
        setSelectedSlot(null);
      };

      const handleNextMonth = () => {
        if (currentMonth === 11) {
          setCurrentMonth(0);
          setCurrentYear(currentYear + 1);
        } else {
          setCurrentMonth(currentMonth + 1);
        }
        setSelectedDate(null);
        setSelectedSlot(null);
      };

      const handleDayClick = (day) => {
        const clicked = new Date(currentYear, currentMonth, day);
        if (clicked < new Date(today.getFullYear(), today.getMonth(), today.getDate())) return;

        setSelectedDate(day);
        setSelectedSlot(null);
      };

      const timeSlots = [
        '07:00 PM - 07:15 PM',
        '07:15 PM - 07:30 PM',
        '07:30 PM - 07:45 PM',
        '07:45 PM - 08:00 PM'
      ];

      const cells = [];
      for (let i = 0; i < firstDayIndex; i++) {
        cells.push(<div key={`empty-${i}`} className="calendar-day-cell disabled" style={{ background: 'transparent', cursor: 'default' }} />);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const currentCellDate = new Date(currentYear, currentMonth, day);
        const isPast = currentCellDate < new Date(today.getFullYear(), today.getMonth(), today.getDate());
        const isSelected = selectedDate === day;
        const isToday = today.getDate() === day && today.getMonth() === currentMonth && today.getFullYear() === currentYear;

        cells.push(
          <div
            key={`day-${day}`}
            className={`calendar-day-cell ${isPast ? 'disabled' : ''} ${isSelected ? 'selected' : ''} ${isToday ? 'today' : ''}`}
            onClick={() => handleDayClick(day)}
            style={{
              aspectRatio: '1',
              display: 'flex',
              alignItems: 'center',
              justifycontent: 'center',
              borderRadius: '50%',
              fontSize: '14px',
              fontWeight: '600',
              cursor: isPast ? 'not-allowed' : 'pointer',
              color: isSelected ? '#ffffff' : (isPast ? '#d1d5db' : '#1f2937'),
              background: isSelected ? '#f43f5e' : 'transparent',
              border: isToday ? '1.5px solid #f43f5e' : 'none',
              boxShadow: isSelected ? '0 4px 12px rgba(244, 63, 94, 0.3)' : 'none',
              transition: 'background 0.2s, color 0.2s',
              display: 'inline-flex',
              alignItems: 'center',
              justifyContent: 'center',
              width: '100%',
              height: '100%'
            }}
          >
            {day}
          </div>
        );
      }

      return (
        <div className="calendar-container" style={{ background: 'transparent', border: 'none', padding: 0, boxShadow: 'none', display: 'flex', flexDirection: 'column', gap: '20px', width: '100%' }}>
          <div className="calendar-header-ui" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', color: '#0a0a0f', fontSize: '18px', fontWeight: '700' }}>
            <span>{months[currentMonth]} {currentYear}</span>
            <div style={{ display: 'flex', gap: '8px' }}>
              <button
                className="calendar-btn-nav"
                onClick={handlePrevMonth}
                style={{ background: '#ffffff', border: '1px solid #e5e7eb', borderRadius: '8px', width: '32px', height: '32px', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: '#4b5563', transition: 'all 0.2s' }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = '#f43f5e'; e.currentTarget.style.color = '#f43f5e'; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = '#e5e7eb'; e.currentTarget.style.color = '#4b5563'; }}
              >
                &lt;
              </button>
              <button
                className="calendar-btn-nav"
                onClick={handleNextMonth}
                style={{ background: '#ffffff', border: '1px solid #e5e7eb', borderRadius: '8px', width: '32px', height: '32px', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: '#4b5563', transition: 'all 0.2s' }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = '#f43f5e'; e.currentTarget.style.color = '#f43f5e'; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = '#e5e7eb'; e.currentTarget.style.color = '#4b5563'; }}
              >
                &gt;
              </button>
            </div>
          </div>

          <div className="calendar-grid-days" style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '6px', textAlign: 'center' }}>
            {daysOfWeek.map(d => (
              <div key={d} className="calendar-day-header" style={{ fontSize: '12px', fontWeight: '700', color: '#9ca3af', textTransform: 'uppercase', paddingBottom: '6px' }}>{d}</div>
            ))}
            {cells}
          </div>

          {selectedDate && (
            <div className="slots-container" style={{ borderTop: '1px solid rgba(0, 0, 0, 0.06)', paddingTop: '20px', animation: 'fadeIn 0.3s' }}>
              <div className="slots-title" style={{ fontSize: '13px', fontWeight: '700', color: '#374151', marginBottom: '12px', textTransform: 'uppercase', letterSpacing: '0.02em', textAlign: 'left' }}>
                Available Slots for {months[currentMonth]} {selectedDate}
              </div>
              <div className="slots-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(140px, 1fr))', gap: '10px' }}>
                {timeSlots.map(slot => (
                  <div
                    key={slot}
                    className={`slot-item ${selectedSlot === slot ? 'selected' : ''}`}
                    onClick={() => {
                      setSelectedSlot(slot);
                      onSelectSlot({
                        date: new Date(currentYear, currentMonth, selectedDate),
                        time: slot
                      });
                    }}
                    style={{
                      padding: '10px 14px',
                      borderRadius: '10px',
                      border: selectedSlot === slot ? '1.5px solid #f43f5e' : '1.5px solid #e5e7eb',
                      background: selectedSlot === slot ? '#f43f5e' : '#ffffff',
                      color: selectedSlot === slot ? '#ffffff' : '#374151',
                      fontSize: '13.5px',
                      fontWeight: '600',
                      textAlign: 'center',
                      cursor: 'pointer',
                      transition: 'all 0.2s'
                    }}
                    onMouseEnter={e => {
                      if (selectedSlot !== slot) {
                        e.currentTarget.style.borderColor = '#f43f5e';
                        e.currentTarget.style.color = '#f43f5e';
                        e.currentTarget.style.background = 'rgba(244, 63, 94, 0.03)';
                      }
                    }}
                    onMouseLeave={e => {
                      if (selectedSlot !== slot) {
                        e.currentTarget.style.borderColor = '#e5e7eb';
                        e.currentTarget.style.color = '#374151';
                        e.currentTarget.style.background = '#ffffff';
                      }
                    }}
                  >
                    {slot.split(' - ')[0]}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    };

    /* ─── MEETING ─── */
    const Meeting = () => {

          setLoading(false);
          setSuccess(true);

      };

      useEffect(() => {
        if (useCalCom) {
          // Official Cal.com inline embed loader initialization

            let d = C.document;
            C.Cal = C.Cal || function () {
              let cal = C.Cal;
              let ar = arguments;
              if (!cal.loaded) {
                cal.ns = {};
                cal.q = cal.q || [];
                d.head.appendChild(d.createElement("script")).src = A;
                cal.loaded = true;
              }
              if (ar[0] === L) {
                const api = function () { p(api, arguments); };
                const namespace = ar[1];
                api.q = api.q || [];
                if (typeof namespace === "string") {
                  cal.ns[namespace] = cal.ns[namespace] || api;
                  p(cal.ns[namespace], ar);
                  p(cal, ["initNamespace", namespace]);
                } else p(cal, ar);
                return;
              }
              p(cal, ar);
            };
          })(window, "https://app.cal.com/embed/embed.js", "init");

          window.Cal("init", "15min", { origin: "https://app.cal.com" });

        }

            inset: 0,
            backgroundImage: 'radial-gradient(rgba(10, 10, 15, 0.12) 1.5px, transparent 1.5px)',
            backgroundSize: '32px 32px',
            opacity: 0.8,
            zIndex: 0,
            pointerEvents: 'none'
          }} />

              <div style={{ display: 'flex', justifyContent: 'center', marginBottom: '20px' }}>
                <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', border: '1px solid rgba(0, 0, 0, 0.12)', borderRadius: '100px', padding: '6px 16px', fontSize: '13px', fontWeight: '500', color: '#0a0a0f', background: 'transparent' }}>

              <div className="popup-content" onClick={e => e.stopPropagation()} style={{ background: 'linear-gradient(to bottom, rgba(244, 63, 94, 0.06) 0%, #ffffff 100%)', border: '1px solid rgba(0, 0, 0, 0.08)', borderRadius: '24px', padding: '36px', maxWidth: '480px', width: '100%', boxShadow: '0 20px 60px rgba(0,0,0,0.15)' }}>
                {loading ? (
                  /* Rotating Loader state card */
                  <div style={{ textAlign: 'center', padding: '32px 0', animation: 'fadeIn 0.3s' }}>
                    <div className="spinner" style={{
                      width: '48px',
                      height: '48px',
                      border: '4px solid rgba(244, 63, 94, 0.1)',
                      borderTop: '4px solid #f43f5e',
                      borderRadius: '50%',
                      margin: '0 auto 24px',
                      animation: 'spin 1s linear infinite'
                    }} />
                    <h3 style={{ fontSize: '20px', fontWeight: 800, marginBottom: '8px', color: '#0a0a0f', letterSpacing: '-0.02em' }}>Processing Booking</h3>
                    <p style={{ color: '#6b7280', fontSize: '14px' }}>Securing your consultation slot...</p>
                  </div>
                ) : success ? (
                  /* Successful booking confirmation card with details */
                  <div style={{ textAlign: 'center', padding: '24px 0', animation: 'fadeIn 0.3s' }}>
                    <div style={{ width: '64px', height: '64px', borderRadius: '50%', background: '#22c55e20', color: '#22c55e', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 20px' }}>
                      <svg width="32" height="32" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" /></svg>
                    </div>
                    <h3 style={{ fontSize: '22px', fontWeight: 800, marginBottom: '8px', color: '#0a0a0f', letterSpacing: '-0.02em' }}>Success! Booking Applied</h3>
                    <p style={{ color: '#6b7280', fontSize: '14px', marginBottom: '24px' }}>Your consultation session details are verified:</p>

                    {/* Booking details card simplified */}
                    <div style={{ background: '#f9fafb', border: '1px solid #e5e7eb', borderRadius: '16px', padding: '20px', textAlign: 'left', marginBottom: '28px' }}>
                      <div style={{ fontSize: '13px', color: '#6b7280', marginBottom: '4px' }}>Day</div>
                      <div style={{ fontSize: '15px', fontWeight: '700', color: '#0a0a0f', marginBottom: '12px' }}>{formattedDateStr}</div>

                      <div style={{ fontSize: '13px', color: '#6b7280', marginBottom: '4px' }}>Time</div>
                      <div style={{ fontSize: '15px', fontWeight: '700', color: '#0a0a0f', marginBottom: '12px' }}>{bookingDetails?.time}</div>

                      <div style={{ fontSize: '13px', color: '#6b7280', marginBottom: '4px' }}>Email</div>
                      <div style={{ fontSize: '15px', fontWeight: '700', color: '#0a0a0f' }}>{email}</div>
                    </div>

                    <button
                      type="button"
                      className="btn-primary"
                      onClick={() => {
                        setFormActive(false);
                        setSuccess(false);
                        setName('');
                        setEmail('');
                        setDesc('');
                      }}
                      style={{ width: '100%', justifyContent: 'center' }}
                    >
                      Done
                    </button>
                  </div>
                ) : (
                  <form onSubmit={handleConfirmBooking}>
                    <h3 style={{ fontSize: '22px', fontWeight: 800, marginBottom: '8px', color: '#0a0a0f', letterSpacing: '-0.02em' }}>Confirm Your Session</h3>
                    <p style={{ fontSize: '13.5px', color: '#6b7280', marginBottom: '24px' }}>
                      Selected: <strong>{formattedDateStr}</strong> at <strong>{bookingDetails?.time}</strong>
                    </p>

                    <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                      <div>
                        <label className="dark-label" style={{ marginBottom: '6px' }}>Your Name</label>
                        <input className="dark-input" type="text" required placeholder="John Doe" value={name} onChange={e => setName(e.target.value)} style={{ border: '1px solid #e5e7eb' }} />
                      </div>

                      <div>
                        <label className="dark-label" style={{ marginBottom: '6px' }}>Email Address</label>
                        <input className="dark-input" type="email" required placeholder="john@example.com" value={email} onChange={e => setEmail(e.target.value)} style={{ border: '1px solid #e5e7eb' }} />
                      </div>

                      <div>
                        <label className="dark-label" style={{ marginBottom: '6px' }}>Project Description</label>
                        <textarea className="dark-input" rows="3" placeholder="Tell me a bit about your project..." value={desc} onChange={e => setDesc(e.target.value)} style={{ border: '1px solid #e5e7eb', resize: 'none' }} />
                      </div>

                      <div style={{ display: 'flex', gap: '12px', marginTop: '8px' }}>
                        <button type="submit" className="btn-primary" style={{ flex: 1, justifyContent: 'center' }}>Confirm Booking</button>
                        <button type="button" className="btn-ghost" onClick={() => setFormActive(false)} style={{ padding: '0 24px' }}>Cancel</button>
                      </div>
                    </div>
                  </form>
                )}
              </div>
            </div>
          )}
        </section>
      );
    };

    /* ─── APP ─── */
    const App = () => {
      return (
        <div>
          <ScrollToTop />
          <Navbar />
          <Hero />
          <Marquee />
          <About />
          <Projects />
          <Services />
          <Contact />
          <Meeting />
          <Footer />
          <BottomNav />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
