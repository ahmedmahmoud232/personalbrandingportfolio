<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kacper — Personal Brand Specialist</title>
  <meta name="description" content="Kacper, a Personal Brand Specialist crafting premium digital experiences.">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { ink: '#0a0a0f', offwhite: '#f5f4f0', accent: '#5b5bd6', accentL: '#7c7de8', dim: '#6b7280', card: '#ffffff', border: '#e5e7eb' },
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          fontSize: { '10xl': ['10rem', { lineHeight: '0.9' }], '9xl': ['8rem', { lineHeight: '0.9' }] }
        }
      }
    }
  </script>
  <style>
    @keyframes floatUp {
      0% {
        transform: translateY(0) translateX(0) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      50% {
        transform: translateY(-60vh) translateX(var(--sway-distance)) rotate(calc(var(--rotation) / 2));
      }

      95% {
        opacity: 1;
      }

      100% {
        transform: translateY(-130vh) translateX(var(--end-sway, 0px)) rotate(var(--rotation));
        opacity: 0;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html {
      scroll-behavior: smooth
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #0a0a0f;
      overflow-x: hidden;
      cursor: url('data:image/svg+xml;utf8,<svg width="20" height="24" viewBox="0 0 20 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0 0L0 20L5.5 14.5L9 22L12 21L8.5 13.5H16L0 0Z" fill="black" stroke="white" stroke-width="1.5" stroke-linejoin="round"/></svg>'), auto
    }

    a,
    button,
    input,
    textarea,
    select {
      font-family: inherit
    }

    a,
    button,
    select,
    .f-card-b,
    .m-item img,
    label {
      cursor: pointer !important
    }

    input,
    textarea,
    p,
    h1,
    h2,
    h3,
    h4,
    span,
    div.hero-sub {
      cursor: text
    }

    ::selection {
      background: #5b5bd620;
      color: #0a0a0f
    }

    /* ─── NAV ─── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 100;
      padding: 16px 48px;
      pointer-events: none;
      /* let clicks pass through the transparent area */
      transition: all .4s ease;
      animation: heroEntrance 0.8s ease backwards;
    }

    nav.scrolled {
      padding: 12px 48px
    }

    /* The actual pill container */
    .nav-pill {
      width: 100%;
      max-width: 1104px;
      margin: 0 auto;
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      border: 1px solid transparent;
      border-radius: 100px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px 0 24px;
      position: relative;
      pointer-events: all;
      box-shadow: none;
      transition: all .3s ease;
    }

    .nav-logo-img {
      height: 30px;
      width: auto;
      object-fit: contain;
    }

    nav.scrolled .nav-pill {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 17px;
      font-weight: 900;
      letter-spacing: -.03em;
      color: #0a0a0f;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: #5b5bd6;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg {
      width: 14px;
      height: 14px;
      stroke: white;
      stroke-width: 2.5;
      fill: none
    }

    .logo-text {
      color: #0a0a0f
    }

    .logo-text span {
      color: #5b5bd6
    }

    /* Center links */
    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .nav-links a {
      font-size: 13px;
      font-weight: 500;
      color: #6b7280;
      text-decoration: none;
      transition: color .2s, background .2s;
      letter-spacing: .01em;
      padding: 6px 14px;
      border-radius: 100px;
    }

    .nav-links a:hover,
    .nav-links a.active-nav {
      color: #0a0a0f;
      background: rgba(0, 0, 0, 0.05)
    }

    /* CTA area */
    .nav-cta {
      display: flex;
      flex-direction: row !important;
      gap: 8px;
      align-items: center;
      flex-shrink: 0
    }

    /* Shared buttons — keep existing class names so rest of page still works */
    .btn-primary {
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #ffffff;
      padding: 10px 22px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      transition: all .25s;
      letter-spacing: .01em;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 42px;
      white-space: nowrap;
    }

    .btn-primary:hover {
      background: #f43f5e;
      color: #ffffff;
      border-color: #f43f5e;
      box-shadow: 0 8px 24px rgba(244, 63, 94, 0.35);
      transform: translateY(-1px)
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #0a0a0f;
      padding: 10px 22px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      border: 1.5px solid rgba(0, 0, 0, 0.08);
      transition: all .25s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 42px;
      white-space: nowrap;
    }

    .btn-ghost:hover {
      background: #f43f5e;
      color: #ffffff;
      border-color: #f43f5e;
      box-shadow: 0 8px 24px rgba(244, 63, 94, 0.35);
      transform: translateY(-1px)
    }

    /* Mobile Menu Styles */
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      color: #0a0a0f;
      cursor: pointer;
      padding: 4px;
    }

    .mobile-menu {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: rgba(245, 244, 240, 0.98);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 90;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      transform: translateY(-20px);
    }

    .mobile-menu.open {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    .mobile-menu a.m-link {
      font-size: 24px;
      font-weight: 700;
      color: #0a0a0f;
      text-decoration: none;
      transition: color 0.2s;
    }

    .mobile-menu a.m-link:hover,
    .mobile-menu a.m-link.active-nav {
      color: #5b5bd6;
    }

    .mobile-menu-cta {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
      margin-top: 24px;
    }

    /* Bottom Navigation Bar */
    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(0, 0, 0, 0.07);
      border-radius: 100px;
      padding: 10px 20px;
      z-index: 95;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    }

    .bottom-nav-inner {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .b-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #9ca3af;
      text-decoration: none;
      transition: all 0.3s;
      cursor: pointer;
    }

    .b-nav-item.active,
    .b-nav-item:hover {
      color: #0a0a0f;
    }

    .b-nav-icon {
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .b-nav-item:active .b-nav-icon {
      transform: scale(0.75);
    }

    .b-nav-item span {
      font-size: 10px;
      font-weight: 600;
    }

    @media(max-width:960px) {

      .nav-links,
      .nav-cta {
        display: none !important;
      }

      .nav-toggle {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .bottom-nav {
        display: block;
      }

      .nav-pill {
        max-width: calc(100% - 32px);
        padding: 0 12px 0 16px
      }

      nav {
        padding: 12px 16px
      }

      footer {
        padding-bottom: 120px !important;
      }
    }

    @media(max-width:540px) {
      .logo-text {
        display: none
      }

      .nav-pill {
        padding: 0 8px 0 8px;
        height: 52px
      }

      .btn-primary {
        padding: 8px 16px;
        font-size: 12px
      }

      .btn-ghost {
        padding: 8px 14px;
        font-size: 12px
      }
    }

    @media(max-width:420px) {
      .nav-pill {
        max-width: calc(100% - 20px)
      }

      .hero-tag {
        margin-bottom: 20px;
      }

      .hero-h1 {
        font-size: 32px;
        line-height: 1.2;
        margin-bottom: 12px
      }

      .hero-sub {
        font-size: 14px;
        margin-bottom: 24px;
        line-height: 1.6;
      }

      .hero-actions {
        margin-bottom: 32px;
      }
    }

    /* ─── HERO ─── */
    @keyframes heroEntrance {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #home {
      min-height: auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0;
      position: relative;
      overflow: hidden;
      background: transparent;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0
    }

    .hero-line-grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(10, 10, 15, 0.12) 1.5px, transparent 1.5px);
      background-size: 32px 32px;
      z-index: 0;
      opacity: 0.8;
    }

    /* two-col layout */
    .hero-inner {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      padding: 120px 48px 80px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 40px;
      min-height: 80vh;
    }

    .hero-content {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
    }

    /* available tag — always visible, never moves */
    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 100px;
      padding: 6px 14px 6px 6px;
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      margin-bottom: 32px;
      box-shadow: none;
      flex-shrink: 0;
      animation: heroEntrance 0.8s ease backwards;
      animation-delay: 0.1s;
    }

    .hero-tag-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #22c55e;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse-green 2s ease-in-out infinite;
    }

    @keyframes pulse-green {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(34, 197, 94, .4)
      }

      50% {
        box-shadow: 0 0 0 6px rgba(34, 197, 94, 0)
      }
    }

    .hero-tag-dot svg {
      width: 10px;
      height: 10px;
      stroke: #fff;
      stroke-width: 3;
      fill: none
    }

    /* h1 has reserved height so layout never reflows */
    .hero-h1 {
      font-size: clamp(36px, 4.5vw, 68px);
      font-weight: 500;
      line-height: 1.15;
      letter-spacing: -.035em;
      color: #0a0a0f;
      margin-bottom: 28px;
      display: flex;
      align-items: flex-start;
      flex-shrink: 0;
      animation: heroEntrance 0.8s ease backwards;
      animation-delay: 0.2s;
    }

    .hero-h1 em {
      font-style: normal;
      color: #5b5bd6
    }

    .hero-sub {
      font-size: 15px;
      line-height: 1.75;
      color: #6b7280;
      max-width: 440px;
      margin-bottom: 36px;
      flex-shrink: 0;
      animation: heroEntrance 0.8s ease backwards;
      animation-delay: 0.3s;
    }

    /* CTA buttons — stacked below sub, never move */
    .hero-actions {
      display: flex;
      flex-direction: row !important;
      gap: 12px;
      flex-shrink: 0;
      margin-bottom: 40px;
      align-items: center;
      animation: heroEntrance 0.8s ease backwards;
      animation-delay: 0.4s;
    }

    .hero-scroll {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      font-weight: 600;
      color: #9ca3af;
      letter-spacing: .1em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .scroll-line {
      width: 40px;
      height: 1px;
      background: #d1d5db
    }

    /* image side */
    .hero-visual {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 500px;
      animation: heroEntrance 1s ease backwards;
      animation-delay: 0.3s;
    }

    .hero-img {
      position: absolute;
      top: 50%;
      left: 50%;
      height: 500px;
      transform: translate(-50%, -50%) scale(1.15);
      transform-origin: center center;
      width: auto;
      object-fit: contain;
      /* no background — image has transparent bg */
      mix-blend-mode: multiply;
      /* blends white bg of PNG away on the #f5f4f0 bg */
      user-select: none;
      filter: drop-shadow(0 20px 60px rgba(91, 91, 214, .15));
    }

    /* floating cards */
    .f-card {
      position: absolute;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1.5px solid rgba(255, 255, 255, 0.4);
      padding: 14px 20px;
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      font-weight: 700;
      color: #0a0a0f;
      z-index: 10;
      white-space: nowrap;
    }

    .f-card-l {
      top: 25%;
      left: -30px;
    }

    .f-card-r {
      top: 75%;
      right: -30px;
      z-index: 10;
    }

    .f-card-b {
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #0a0a0f;
      color: white;
      padding: 14px;
      border-radius: 50px;
      transition: all .4s cubic-bezier(.16, 1, .3, 1);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0;
    }

    .f-card-b:hover {
      padding: 14px 24px;
      gap: 12px;
      background: #5b5bd6;
      box-shadow: 0 20px 40px rgba(91, 91, 214, 0.3);
    }

    .f-card-b-text {
      max-width: 0;
      opacity: 0;
      white-space: nowrap;
      overflow: hidden;
      transition: all .4s cubic-bezier(.16, 1, .3, 1);
    }

    .f-card-b:hover .f-card-b-text {
      max-width: 150px;
      opacity: 1;
    }

    .f-icon {
      width: 20px;
      height: 20px;
      color: #5b5bd6
    }

    /* subtle accent ring behind image */
    .hero-ring {
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, #5b5bd618 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
    }

    .hero-img-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    /* ─── TYPEWRITER ─── */
    .tw-wrap {
      display: block;
      /* prevent layout shift: the span inside grows but the h1 min-height absorbs it */
    }

    .tw-cursor {
      display: inline-block;
      width: 3px;
      height: .75em;
      background: #5b5bd6;
      vertical-align: middle;
      margin-left: 4px;
      animation: blink 1s step-end infinite;
      border-radius: 2px;
    }

    @keyframes blink {
      50% {
        opacity: 0
      }
    }

    /* hero responsive */
    @media(max-width:1100px) {

      .f-card-l,
      .f-card-r {
        display: none
      }
    }

    @media(max-width:860px) {
      #home {
        min-height: auto;
      }

      .hero-inner {
        grid-template-columns: 1fr;
        padding: 100px 24px 60px;
        min-height: auto;
        gap: 24px;
      }

      .hero-visual {
        display: none
      }

      .hero-content {
        align-items: center;
        text-align: center;
      }

      .hero-tag {
        margin-bottom: 24px;
      }

      .hero-h1 {
        margin-bottom: 20px;
      }

      .hero-sub {
        margin-bottom: 28px;
      }
    }

    /* ─── MARQUEE ─── */
    .marquee-sec {
      border: none;
      background: transparent;
      overflow: hidden;
      padding: 20px 0
    }

    .marquee-track {
      display: flex;
      width: max-content;
      animation: run 55s linear infinite
    }

    @media(max-width:860px) {
      .marquee-track {
        animation: run 40s linear infinite
      }
    }

    @media(max-width:420px) {
      .marquee-track {
        animation: run 30s linear infinite
      }
    }

    .marquee-sec:hover .marquee-track {
      animation-play-state: paused
    }

    @keyframes run {
      to {
        transform: translateX(-50%)
      }
    }

    .m-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 56px;
      white-space: nowrap;
      font-size: 15px;
      font-weight: 700;
      color: #9ca3af;
      letter-spacing: -.01em;
      transition: color .3s
    }

    .m-item:hover {
      color: #0a0a0f
    }

    .m-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 13px;
      flex-shrink: 0;
      transition: transform .3s, box-shadow .3s
    }

    .m-item:hover .m-icon {
      transform: scale(1.12);
      box-shadow: 0 4px 14px rgba(0, 0, 0, .12)
    }

    .m-div {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #e5e7eb;
      flex-shrink: 0
    }

    /* ─── ABOUT ─── */
    #about {
      background: transparent;
      padding-top: 45px;
      padding-bottom: 10px;
    }

    .about-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 48px
    }

    .about-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1.5px solid rgba(0, 0, 0, 0.08);
      border-radius: 16px;
      padding: 6px 10px;
      margin: 0 6px;
      vertical-align: middle;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
      transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .about-badge:hover {
      transform: translateY(-4px) scale(1.08);
      background: rgba(255, 255, 255, 0.8);
      border-color: #f43f5e;
      box-shadow: 0 12px 30px rgba(244, 63, 94, 0.2);
    }

    .section-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: #5b5bd6;
      margin-bottom: 20px
    }

    .design-frame-wrap {
      text-align: center;
      margin-bottom: 40px;
      margin-top: 20px;
    }

    .design-frame {
      display: inline-flex;
      position: relative;
      padding: 8px 18px;
      border: 1.5px dashed #0a0a0f;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px);

    /* ─── FOOTER ─── */

    }

    }

    .footer-links {

    }

    .footer-links a {
      font-size: 13px;
      font-weight: 600;
      color: #4b5563;
      text-decoration: none;
      transition: color .2s
    }

    .footer-links a:hover {
      color: #5b5bd6
    }

    .footer-btns {
      display: flex;
      gap: 10px;
      margin-bottom: 48px
    }

    /* ─── SCROLL REVEAL ─── */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity .8s cubic-bezier(.16, 1, .3, 1), transform .8s cubic-bezier(.16, 1, .3, 1)
    }

    .reveal.visible {
      opacity: 1;

    }

    @media(max-width:900px) {

        grid-template-columns: 1fr

    /* ─── SCROLL TO TOP ─── */
    .scroll-to-top {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 8px 30px rgba(244, 63, 94, 0.12);
      color: #f43f5e;

      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 99;
      opacity: 0;
      visibility: hidden;
      transform: scale(0.8) translateY(10px);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      outline: none;
    }

    .scroll-to-top.visible {
      opacity: 1;
      visibility: visible;
      transform: scale(1) translateY(0);
    }

    .scroll-to-top:hover {
      background: #f43f5e;
      color: white;
      transform: scale(1.05) translateY(-3px);
      box-shadow: 0 12px 35px rgba(244, 63, 94, 0.25);
      border-color: #f43f5e;
    }

    .scroll-to-top svg {
      width: 20px;
      height: 20px;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .scroll-to-top:hover svg {
      transform: translateY(-2px);
    }

    /* ─── SCHEDULE MEETING SECTION ─── */
    #schedule {
      background: transparent;
      padding: 100px 0;
      position: relative;
      overflow: hidden;
      border-top: 1px solid rgba(255, 255, 255, 0.08);

        grid-template-columns: 1fr;

      border-radius: 100px;

    .schedule-h2 {
      font-size: clamp(32px, 4vw, 48px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: #0a0a0f;
      margin-bottom: 16px;
    }

    .schedule-p {
      font-size: 15px;
      color: #6b7280;
      line-height: 1.8;
      margin-bottom: 32px;
    }

    .schedule-details-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
    }

    .sched-detail-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }

    .sched-detail-icon {
      font-size: 24px;
      width: 44px;
      height: 44px;
      background: white;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);

    .sched-detail-title {
      font-size: 10px;
      font-weight: 800;

      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

      font-size: 14px;
      font-weight: 700;
      color: #0a0a0f;
      margin-top: 2px;
    }

    /* Custom Interactive Calendar */
    .calendar-container {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: 24px;

    .calendar-header-ui {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 800;
      color: #ffffff;
      font-size: 16px;
    }

    .calendar-btn-nav {
      background: rgba(255, 255, 255, 0.05);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: bold;
      color: #ffffff;
      transition: all 0.2s;
    }

    .calendar-btn-nav:hover {
      background: #fff5f6;
      border-color: rgba(244, 63, 94, 0.3);
      color: #f43f5e;
    }

    .calendar-grid-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      text-align: center;
    }

    .calendar-day-header {
      font-size: 11px;
      font-weight: 800;
      color: #9ca3af;
      text-transform: uppercase;
      padding-bottom: 4px;
    }

    .calendar-day-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      color: #ffffff;
    }

    .calendar-day-cell:hover:not(.disabled) {
      background: rgba(255, 255, 255, 0.1);
    }

    .calendar-day-cell.selected {
      background: #f43f5e !important;
      color: white !important;
      box-shadow: 0 4px 12px rgba(244, 63, 94, 0.3);
    }

    .calendar-day-cell.disabled {
      color: rgba(255, 255, 255, 0.2);
      cursor: not-allowed;
    }

    .calendar-day-cell.today {
      border: 2px solid #f43f5e;
    }

    .slots-container {
      border-top: 1px solid rgba(255, 255, 255, 0.08);

    }

    .slots-title {

      color: #ffffff;
      margin-bottom: 12px;

    .slots-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .slot-item {
      padding: 12px;
      border-radius: 10px;
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      text-align: center;
      font-weight: 700;
      font-size: 13.5px;
      cursor: pointer;
      color: #ffffff;
      transition: all 0.2s;

    .slot-item:hover:not(.selected) {
      border-color: rgba(244, 63, 94, 0.5);
      color: #f43f5e;
      background: rgba(255, 255, 255, 0.05);

    .slot-item.selected {
      background: #f43f5e;
      color: white;
      border-color: #f43f5e;
    }

    @media (max-width: 768px) {
      #my-cal-inline-15min {
        border: 1.5px solid rgba(0, 0, 0, 0.08) !important;

        height: auto !important;

      }
    }
  </style>

<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ─── NATIVE CSS CURSOR USED INSTEAD OF JS ─── */

    /* ─── SCROLL REVEAL ─── */
    function useScrollReveal(ref, delay = 0) {
      useEffect(() => {
        const el = ref.current; if (!el) return;
        el.style.transitionDelay = `${delay}ms`;
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) { el.classList.add('visible'); obs.unobserve(el) }
        }, { threshold: .12 });
        obs.observe(el); return () => obs.disconnect();
      }, []);
    }
    const R = ({ children, d = 0, className = '' }) => {
      const r = useRef();
      useScrollReveal(r, d);
      return <div ref={r} className={`reveal ${className}`}>{children}</div>;
    };

    /* ─── SVGs ─── */
    const Svg = {
      download: <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg>,
      arrow: <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" /></svg>,
      mail: <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2" /><path d="M22 7l-10 7L2 7" /></svg>,
      linkedin: <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" viewBox="0 0 24 24"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-4 0v7h-4v-7a6 6 0 016-6z" /><rect x="2" y="9" width="4" height="12" /><circle cx="4" cy="4" r="2" /></svg>,
      check: <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" /></svg>,
      monitor: <svg width="26" height="26" fill="none" stroke="#5b5bd6" strokeWidth="1.75" strokeLinecap="round" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" /><line x1="8" y1="21" x2="16" y2="21" /><line x1="12" y1="17" x2="12" y2="21" /></svg>,
      layout: <svg width="26" height="26" fill="none" stroke="#5b5bd6" strokeWidth="1.75" strokeLinecap="round" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" /><line x1="3" y1="9" x2="21" y2="9" /><line x1="9" y1="21" x2="9" y2="9" /></svg>,
      phone: <svg width="26" height="26" fill="none" stroke="#5b5bd6" strokeWidth="1.75" strokeLinecap="round" viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2" /><line x1="12" y1="18" x2="12.01" y2="18" strokeWidth="3" /></svg>,
      menu: <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" viewBox="0 0 24 24"><line x1="4" y1="8" x2="20" y2="8" /><line x1="4" y1="16" x2="20" y2="16" /></svg>,
      close: <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>,
      behance: <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22 7h-7v-2h7v2zm1.726 10c-.442 1.297-2.029 3-5.101 3-3.074 0-5.564-1.729-5.564-5.675 0-3.91 2.325-5.92 5.466-5.92 3.082 0 4.964 1.782 5.375 4.426.078.506.109 1.188.095 2.14h-8.027c.13 3.211 3.483 3.312 4.588 2.029h3.168zm-7.686-4h4.965c-.105-1.546-1.436-2.35-2.461-2.35-.911 0-2.342.668-2.504 2.35zm-8.534-11v18h4.597c2.19 0 3.791-.259 4.887-1.427 1.09-1.162 1.32-2.825.438-4.184.898-1.077 1.242-2.735.088-3.978-1.127-1.22-2.613-1.411-4.757-1.411h-5.253zm3.5 11h1.492c1.078 0 2.213.253 2.213 1.5 0 1.258-1.196 1.5-2.213 1.5h-1.492v-3zm0-7h1.487c.725 0 1.947.23 1.947 1.341 0 1.242-1.354 1.298-2.115 1.298h-1.319v-2.639z" /></svg>,
      figma: <svg width="22" height="22" viewBox="0 0 38 57" fill="none"><path d="M19 28.5C19 33.7467 14.7467 38 9.5 38C4.25329 38 0 33.7467 0 28.5C0 23.2533 4.25329 19 9.5 19H19V28.5Z" fill="#0ACF83" /><path d="M0 47.5C0 52.7467 4.25329 57 9.5 57C14.7467 57 19 52.7467 19 47.5V38H9.5C4.25329 38 0 42.2533 0 47.5Z" fill="#A259FF" /><path d="M19 0H9.5C4.25329 0 0 4.2533 0 9.5C0 14.7467 4.25329 19 9.5 19H19V0Z" fill="#F24E1E" /><path d="M19 19H28.5C33.7467 19 38 14.7467 38 9.5C38 4.2533 33.7467 0 28.5 0H19V19Z" fill="#FF7262" /><path d="M38 28.5C38 33.7467 33.7467 38 28.5 38C23.2533 38 19 33.7467 19 28.5C19 23.2533 23.2533 19 28.5 19C33.7467 19 38 23.2533 38 28.5Z" fill="#1ABCFE" /></svg>,
      home: <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>,
      user: <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
      briefcase: <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>,
    };

    /* ─── NAVBAR ─── */
    const Navbar = () => {
      const [scrolled, setScrolled] = useState(false);
      const [isOpen, setIsOpen] = useState(false);
      const [activeId, setActiveId] = useState('home');

      useEffect(() => {
        const handleScroll = () => {
          setScrolled(window.scrollY > 30);

          const scrollPos = window.scrollY + window.innerHeight * 0.5;
          let currentId = 'home';
          const ids = ['home', 'about', 'projects', 'services', 'contact', 'booking'];
          for (let i = ids.length - 1; i >= 0; i--) {
            const section = document.getElementById(ids[i]);
            if (section && section.offsetTop <= scrollPos) {
              currentId = ids[i];
              break;
            }
          }
          setActiveId(currentId);
        };
        window.addEventListener('scroll', handleScroll);
        handleScroll();
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      useEffect(() => {
        if (isOpen) {
          document.body.style.overflow = 'hidden';
          document.body.classList.add('menu-open');
        } else {
          document.body.style.overflow = '';
          document.body.classList.remove('menu-open');
        }
      }, [isOpen]);

      return (
        <>
          <nav className={scrolled ? 'scrolled' : ''}>
            <div className="nav-pill" style={{ zIndex: 100 }}>

              {/* Logo */}
              <div className="logo" style={{ zIndex: 101, alignItems: 'center' }}>
                <img src="images/logo.png" alt="Logo" className="nav-logo-img" />
              </div>

              {/* Center links */}
              <div className="nav-links">
                {['Home', 'About', 'Projects', 'Services', 'Contact', 'Booking'].map(l => (
                  <a key={l} href={`#${l.toLowerCase()}`} className={activeId === l.toLowerCase() ? 'active-nav' : ''}>{l}</a>
                ))}
              </div>

              {/* CTA */}
              <div className="nav-cta">
                <a href="#contact" className="btn-primary" style={{ textDecoration: 'none' }}>Let's Talk</a>
              </div>

              {/* Mobile Toggle with 2-line transition animation */}
              <button
                className={`nav-toggle ${isOpen ? 'open' : ''}`}
                style={{
                  zIndex: 101,
                  width: '32px',
                  height: '32px',
                  position: 'relative'
                }}
                onClick={() => setIsOpen(!isOpen)}
              >
                <span style={{
                  width: '20px',
                  height: '2px',
                  background: 'currentColor',
                  position: 'absolute',
                  transition: 'transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), top 0.3s cubic-bezier(0.4, 0, 0.2, 1)',
                  top: isOpen ? '15px' : '11px',
                  transform: isOpen ? 'rotate(45deg)' : 'none'
                }} />
                <span style={{
                  width: '20px',
                  height: '2px',
                  background: 'currentColor',
                  position: 'absolute',
                  transition: 'transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), top 0.3s cubic-bezier(0.4, 0, 0.2, 1)',
                  top: isOpen ? '15px' : '19px',
                  transform: isOpen ? 'rotate(-45deg)' : 'none'
                }} />
              </button>

            </div>
          </nav>

          {/* Mobile Menu */}
          <div className={`mobile-menu ${isOpen ? 'open' : ''}`} style={{ background: 'rgba(255, 255, 255, 0.98)' }}>
            {['Home', 'About', 'Projects', 'Services', 'Contact', 'Booking'].map(l => (
              <a key={l} href={`#${l.toLowerCase()}`} className={`m-link ${activeId === l.toLowerCase() ? 'active-nav' : ''}`} onClick={() => setIsOpen(false)} style={{ color: '#0a0a0f' }}>{l}</a>
            ))}
            <div className="mobile-menu-cta" style={{ width: '100%', padding: '0 24px' }}>
              <a href="#contact" className="btn-primary" style={{ textDecoration: 'none', width: '100%', justifyContent: 'center' }} onClick={() => setIsOpen(false)}>Let's Talk</a>
            </div>
          </div>
        </>
      );
    };

    /* ─── TYPEWRITER ─── */
    const Typewriter = () => {
      const phrases = ["Turn your idea\ninto a digital product.", "Crafting\nUser-Centric Designs.", "Solving\nComplex Problems."];
      const [pi, setPi] = useState(0);
      const [txt, setTxt] = useState('');
      const [del, setDel] = useState(false);
      useEffect(() => {
        const p = phrases[pi];
        const t = setTimeout(() => {
          if (!del && txt === p) setTimeout(() => setDel(true), 2200);
          else if (del && txt === '') { setDel(false); setPi(i => (i + 1) % phrases.length) }
          else setTxt(p.substring(0, txt.length + (del ? -1 : 1)));
        }, del ? 20 : 50);
        return () => clearTimeout(t);
      }, [txt, del, pi]);
      return (
        <span className="tw-wrap">
          {txt.split('\n').map((line, i) => (
            <span key={i} style={{ display: 'block' }}>{line}{i === txt.split('\n').length - 1 && <span className="tw-cursor" />}</span>
          ))}
        </span>
      );
    };

    /* ─── HERO ─── */
    const Hero = () => {
      return (
        <section id="home">
          <div className="hero-bg"><div className="hero-line-grid" /></div>
          <div className="hero-inner">
            {/* ── LEFT: all content stacked ── */}
            <div className="hero-content">
              {/* Tag */}
              <div className="hero-tag">
                <div className="hero-tag-dot">
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3"><polyline points="20 6 9 17 4 12" /></svg>
                </div>
                Available for bookings
              </div>

              {/* h1 has branding copy */}
              <h1 className="hero-h1" style={{ display: 'block' }}>The proven system for personal brands</h1>

              {/* Sub copy */}
              <p className="hero-sub">I help Business Owners build high-converting, monetization-focused personal brands that turn casual viewers into qualified high-ticket leads.</p>

              {/* CTA buttons */}
              <div className="hero-actions" style={{ gap: '12px', display: 'flex', alignItems: 'center' }}>
                <a href="#contact" className="btn-primary" style={{ textDecoration: 'none' }}>Let's Talk</a>
                <a href="#video" className="btn-ghost" style={{ textDecoration: 'none', display: 'inline-flex', alignItems: 'center', gap: '8px' }}>
                  <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>
                  Watch Vid
                </a>
              </div>
            </div>

            {/* ── RIGHT: image ── */}
            <div className="hero-visual">
              <div className="hero-ring" />
              <div className="hero-img-wrap">
                <img
                  src="images/ChatGPT Image 17 يوليو 2026، 07_29_48 ص.png"
                  alt="Kacper — Personal Brand Specialist"
                  className="hero-img"
                  style={{
                    mixBlendMode: 'multiply',
                    filter: 'none',
                    transform: 'translate(-50%, -50%) scale(1.1)',
                    top: '50%',
                    left: '55%',
                    position: 'absolute'
                  }}
                />
              </div>
            </div>
          </div>
        </section>
      );
    };

    /* ─── MARQUEE ─── */
    const Marquee = () => {
      const logos = [
        "images/Notion-Emblem.png",
        "images/Youtube-Logo.png",
        "images/Linkedin_logo_PNG4.png",
        "images/Instagram_logo_PNG16.png",
        "images/Facebook_logo_PNG9.png"
      ];
      const all = [...logos, ...logos, ...logos, ...logos, ...logos, ...logos];
      return (
        <div className="marquee-sec" style={{ background: 'transparent', border: 'none', margin: '50px 0', padding: '10px 0' }}>
          <div className="marquee-track">
            {all.map((src, i) => (
              <div key={i} className="m-item" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '0 50px' }}>
                <img
                  src={src}
                  alt="Partner Logo"
                  style={{
                    height: '50px',
                    width: 'auto',
                    objectFit: 'contain',
                    opacity: 0.6,
                    filter: 'grayscale(100%)',
                    transition: 'all 0.3s ease'
                  }}
                  onMouseEnter={e => {
                    e.currentTarget.style.opacity = '1';
                    e.currentTarget.style.filter = 'none';
                  }}
                  onMouseLeave={e => {
                    e.currentTarget.style.opacity = '0.6';
                    e.currentTarget.style.filter = 'grayscale(100%)';
                  }}
                />
              </div>
            ))}
          </div>
        </div>
      );
    };

    /* ─── ABOUT ─── */
    const About = () => {
      const [isMobile, setIsMobile] = useState(window.innerWidth <= 768);
      const [messages, setMessages] = useState([
        { sender: 'ahmed', text: "Hey! I'm Kacper. How can I help you build your personal brand today? Ask me anything about my services below!" }
      ]);
      const [typing, setTyping] = useState(false);
      const chatEndRef = useRef(null);

      const [availableQuestions, setAvailableQuestions] = useState([
        {
          id: 1,
          q: "What services do you offer?",
          a: "I offer Brand & Niche Strategy, Scriptwriting & Hook Engineering, and Post-Production & Editing to grow your digital presence."
        },
        {
          id: 2,
          q: "How do we get started?",
          a: "Simply scroll down to my calendar and book a session, or click 'Let's Talk' to send a request."
        },
        {
          id: 3,
          q: "Do you offer custom packages?",
          a: "Yes! Every personal brand is unique. We can tailor a custom design and script package specifically for your needs."
        }
      ]);

      useEffect(() => {
        const handleResize = () => setIsMobile(window.innerWidth <= 768);
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      useEffect(() => {
        if (isMobile) {
          const chatBody = document.querySelector('.chat-body');
          if (chatBody) {
            chatBody.scrollTo({
              top: chatBody.scrollHeight,
              behavior: 'smooth'
            });
          }
        }
      }, [messages, typing, isMobile]);

      const handleQuestionClick = (item) => {
        if (typing) return;
        setMessages(prev => [...prev, { sender: 'user', text: item.q }]);
        setAvailableQuestions(prev => prev.filter(q => q.id !== item.id));
        setTyping(true);

        setTimeout(() => {
          setMessages(prev => [...prev, { sender: 'ahmed', text: item.a }]);
          setTyping(false);
        }, 1000);
      };

      return (
        <section id="about" style={{ position: 'relative', overflow: 'hidden' }}>
          {/* Dot grid background */}
          <div className="about-grid-bg" style={{
            position: 'absolute',
            inset: 0,
            backgroundImage: 'radial-gradient(rgba(10, 10, 15, 0.12) 1.5px, transparent 1.5px)',
            backgroundSize: '32px 32px',
            zIndex: 0,
            opacity: 0.8,
            pointerEvents: 'none'
          }} />



          <div className="about-wrap" style={{ maxWidth: '1000px', margin: '0 auto', padding: '20px 24px', position: 'relative', zIndex: 1 }}>
            {isMobile ? (
              <div style={{ padding: '10px 0' }}>
                <div style={{ display: 'flex', justifyContent: 'center', marginBottom: '20px' }}>
                  <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', border: '1px solid rgba(0, 0, 0, 0.12)', borderRadius: '100px', padding: '6px 16px', fontSize: '13px', fontWeight: '500', color: '#0a0a0f', background: 'transparent' }}>
                    About me
                  </span>
                </div>
                <h2 className="section-h2" style={{ fontSize: 'clamp(24px, 3vw, 36px)', fontWeight: '700', marginTop: '0', marginBottom: '12px', color: '#0a0a0f', letterSpacing: '-0.02em', textAlign: 'center' }}>The Brain Behind The Screen</h2>
                <p style={{ fontSize: '14px', color: '#4b5563', marginBottom: '48px', fontWeight: '500', letterSpacing: '-0.01em', textAlign: 'center' }}>Turn complex business ideas into high-converting</p>

                <div className="chat-window" style={{ maxWidth: '100%', margin: '0 auto', textAlign: 'left', overflow: 'hidden' }}>
                  <div className="chat-header">
                    <div className="chat-header-left">
                      <div className="chat-avatar-wrap">
                        <img src="images/logo.png" className="chat-avatar" alt="Kacper" />
                      </div>
                      <div className="chat-header-info">
                        <div className="chat-name">Kacper <div className="online-dot" /></div>
                        <div className="chat-title">Personal Brand Specialist</div>
                      </div>
                    </div>
                  </div>

                  <div className="chat-body" style={{ minHeight: '260px', maxHeight: '340px', overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: '16px', padding: '16px' }}>
                    {messages.map((msg, idx) => (
                      <div key={idx} className={`msg-row ${msg.sender === 'user' ? 'msg-user' : 'msg-ahmed'}`} style={{ animation: 'fadeInUp 0.3s ease-out' }}>
                        <div className={`msg-bubble ${msg.sender === 'user' ? 'msg-to-ahmed' : 'msg-from-ahmed'}`}>
                          {msg.text}
                        </div>
                      </div>
                    ))}
                    {typing && (
                      <div className="msg-row msg-ahmed" style={{ animation: 'fadeInUp 0.2s ease-out' }}>
                        <div className="typing-indicator" style={{ display: 'flex', gap: '4px', alignItems: 'center' }}>
                          <span /><span /><span />
                        </div>
                      </div>
                    )}

                    {/* Inline Recommended Questions placed directly after the response */}
                    {!typing && availableQuestions.length > 0 && (
                      <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', marginTop: '4px', width: '100%', animation: 'fadeInUp 0.3s ease-out' }}>
                        {availableQuestions.map((item) => (
                          <button
                            key={item.id}
                            className="chat-option-btn"
                            onClick={() => handleQuestionClick(item)}
                            style={{
                              width: '100%',
                              fontSize: '13px',
                              textAlign: 'left',
                              background: '#ffffff',
                              border: '1px solid rgba(0, 0, 0, 0.03)',
                              borderRadius: '24px 24px 24px 4px',
                              padding: '12px 18px',
                              color: '#0a0a0f',
                              fontWeight: '600',
                              cursor: 'pointer',
                              transition: 'all 0.2s ease',
                              outline: 'none',
                              boxShadow: '0 4px 20px rgba(0, 0, 0, 0.02)'
                            }}
                            onMouseEnter={e => {
                              e.currentTarget.style.background = '#f43f5e';
                              e.currentTarget.style.color = '#ffffff';
                              e.currentTarget.style.borderColor = '#f43f5e';
                            }}
                            onMouseLeave={e => {
                              e.currentTarget.style.background = '#ffffff';
                              e.currentTarget.style.color = '#0a0a0f';
                              e.currentTarget.style.borderColor = 'rgba(0, 0, 0, 0.03)';
                            }}
                          >
                            {item.q}
                          </button>
                        ))}
                      </div>
                    )}
                    <div ref={chatEndRef} />
                  </div>
                </div>
              </div>
            ) : (
              <>
                <R>
                  <div style={{ display: 'flex', justifyContent: 'center', marginBottom: '20px' }}>
                    <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', border: '1px solid rgba(0, 0, 0, 0.12)', borderRadius: '100px', padding: '6px 16px', fontSize: '13px', fontWeight: '500', color: '#0a0a0f', background: 'transparent' }}>
                      About me
                    </span>
                  </div>
                </R>
                <R d={50}>
                  <h2 className="section-h2" style={{ fontSize: 'clamp(24px, 3vw, 36px)', fontWeight: '700', marginTop: '0', marginBottom: '12px', color: '#0a0a0f', letterSpacing: '-0.02em', textAlign: 'center' }}>The Brain Behind The Screen</h2>
                </R>
                <R d={75}>
                  <p style={{ fontSize: '14px', color: '#4b5563', marginBottom: '48px', fontWeight: '500', letterSpacing: '-0.01em', textAlign: 'center' }}>Turn complex business ideas into high-converting</p>
                </R>
                <R d={100}>
                  <div className="about-paragraph-container" style={{ fontSize: 'clamp(20px, 2.5vw, 28px)', fontWeight: '500', color: '#0a0a0f', lineHeight: '2.0', letterSpacing: '-0.015em', maxWidth: '1000px', margin: '0 auto', textAlign: 'center', transition: 'all 0.4s ease' }}>
                    "We craft high-impact <span className="about-badge">
                      <img src="images/3dicons-notebook-dynamic-color.png" alt="Notebook" style={{ width: '48px', height: '48px', objectFit: 'contain', display: 'block' }} />
                    </span> scripts that capture <span className="about-badge">
                      <img src="images/3dicons-target-front-color.png" alt="Target" style={{ width: '48px', height: '48px', objectFit: 'contain', display: 'block' }} />
                    </span> attention in the first 3 seconds, transforming passive <span className="about-badge">
                      <img src="images/3dicons-boy-front-color.png" alt="Viewer" style={{ width: '48px', height: '48px', objectFit: 'contain', display: 'block' }} />
                    </span> viewers into high-ticket <span className="about-badge">
                      <img src="images/3dicons-wallet-iso-color.png" alt="Wallet" style={{ width: '48px', height: '48px', objectFit: 'contain', display: 'block' }} />
                    </span> clients for your business."
                  </div>
                </R>
              </>
            )}
          </div>
        </section>
      );
    };

    /* ─── PROJECTS ─── */
    const Projects = () => {
      const [isMobile, setIsMobile] = useState(window.innerWidth <= 768);
      const [activeTab, setActiveTab] = useState(0);
      const [slideIndices, setSlideIndices] = useState({
        youtube: 0,
        linkedin: 0,
        instagram: 0
      });

      useEffect(() => {
        const handleResize = () => setIsMobile(window.innerWidth <= 768);
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      const tabs = [
        {
          id: 'youtube',
          logo: 'images/Youtube-Logo.png',
          title: 'YouTube Growth & Video Eng.',
          accentColor: '#FFEAEA',
          borderColor: '#FFD6D6',
          slides: [
            {
              title: "High-Retention Scripts",
              description: "Crafting strategic scripts and hooks engineered to capture audience attention within the first 3 seconds."
            },
            {
              title: "CTR & Thumbnail Strategy",
              description: "Optimizing layout parameters and visual contrast to maximize organic click-through rates."
            },
            {
              title: "Pacing & Post-Production",
              description: "Applying dynamic sound design and editing blocks to maintain high session retention rates."
            }
          ]
        },
        {
          id: 'linkedin',
          logo: 'images/Linkedin_logo_PNG4.png',
          title: 'LinkedIn Authority Branding',
          accentColor: '#E8F2FC',
          borderColor: '#CCDDF2',
          slides: [
            {
              title: "Authority Carousels",
              description: "Designing high-value carousels and visual assets that position you as an industry leader."
            },
            {
              title: "Hook Optimization",
              description: "Drafting engaging introductory text hooks that invite comments and shares."
            },
            {
              title: "Consistency Blueprint",
              description: "Establishing a posting calendar to stay top-of-mind for prospective B2B clients."
            }
          ]
        },
        {
          id: 'instagram',
          logo: 'images/Instagram_logo_PNG16.png',
          title: 'Instagram Strategy & Scale',
          accentColor: '#FFEAEA',
          borderColor: '#FFD6D6',
          slides: [
            {
              title: "Aesthetic Feed & Grid Layout",
              description: "Designing high-end templates and cohesive layout grids that build a premium visual identity."
            },
            {
              title: "Reels & Story Systems",
              description: "Drafting engaging visual hooks and conversational triggers that maximize story reach and reel retention."
            },
            {
              title: "Inbound Funnel Setup",
              description: "Configuring messaging funnels and call-to-actions to turn profile visits into high-ticket inbound leads."
            }
          ]
        }
      ];

      const handlePrevSlide = (tabId, max) => {
        setSlideIndices(prev => ({ ...prev, [tabId]: (prev[tabId] - 1 + max) % max }));
      };

      const handleNextSlide = (tabId, max) => {
        setSlideIndices(prev => ({ ...prev, [tabId]: (prev[tabId] + 1) % max }));
      };

      return (
        <section id="projects" style={{ position: 'relative', overflow: 'hidden', padding: '80px 24px' }}>
          {/* Dot grid points background */}
          <div className="projects-grid-bg" style={{
            position: 'absolute',
            inset: 0,
            backgroundImage: 'radial-gradient(rgba(10, 10, 15, 0.12) 1.5px, transparent 1.5px)',
            backgroundSize: '32px 32px',
            opacity: 0.8,
            zIndex: 0,
            pointerEvents: 'none'
          }} />

          <div className="projects-inner" style={{ position: 'relative', zIndex: 1, padding: 0 }}>
            {/* Centered Capsule Header styled like About Section */}
            <R>
              <div style={{ display: 'flex', justifyContent: 'center', marginBottom: '20px' }}>
                <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', border: '1px solid rgba(0, 0, 0, 0.12)', borderRadius: '100px', padding: '6px 16px', fontSize: '13px', fontWeight: '500', color: '#0a0a0f', background: 'transparent' }}>
                  Work Process
                </span>
              </div>
            </R>
            <R d={50}>
              <h2 className="section-h2" style={{ fontSize: 'clamp(24px, 3vw, 36px)', fontWeight: '700', marginTop: '0', marginBottom: '12px', color: '#0a0a0f', letterSpacing: '-0.02em', textAlign: 'center' }}>How the Process is Done</h2>
            </R>
            <R d={75}>
              <p style={{ fontSize: '14px', color: '#4b5563', marginBottom: '48px', fontWeight: '500', letterSpacing: '-0.01em', textAlign: 'center' }}>How we build your brand authority from strategy to editing.</p>
            </R>

            {/* Accordion Tabs System */}
            <div style={{ width: '100%', marginTop: '16px' }}>
              {isMobile ? (
                /* Mobile Vertical Accordion Stack */
                <div style={{ display: 'flex', flexDirection: 'column', gap: '16px', width: '100%' }}>
                  {tabs.map((tab, idx) => {
                    const isActive = activeTab === idx;
                    return (
                      <div
                        key={tab.id}
                        onClick={!isActive ? () => setActiveTab(idx) : undefined}
                        style={{
                          background: tab.accentColor,
                          border: isActive ? `1px solid ${tab.borderColor}` : '1px solid rgba(0, 0, 0, 0.05)',
                          borderRadius: '24px',
                          padding: isActive ? '24px 20px 32px' : '16px 20px',
                          transition: 'all 0.5s cubic-bezier(0.16, 1, 0.3, 1)',
                          boxShadow: isActive ? '0 10px 30px rgba(0,0,0,0.02)' : 'none',
                          overflow: 'hidden',
                          cursor: isActive ? 'default' : 'pointer'
                        }}
                      >
                        {!isActive ? (
                          <div
                            style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', padding: '12px 0' }}
                          >
                            <img src={tab.logo} alt="" style={{ width: '150px', height: 'auto', objectFit: 'contain', opacity: 0.7 }} />
                          </div>
                        ) : (
                          <div style={{ animation: 'fadeInUp 0.3s ease-out' }}>
                            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '12px', marginBottom: '24px', textAlign: 'center' }}>
                              <img src={tab.logo} alt="" style={{ width: '90px', height: '90px', objectFit: 'contain' }} />
                              <span style={{ fontSize: '18px', fontWeight: '800', color: '#0a0a0f' }}>{tab.title}</span>
                            </div>

                            {/* Inner Carousel Card Content with Stacked Layers */}
                            <div style={{ position: 'relative', width: '90%', margin: '0 auto 12px', zIndex: 1 }}>
                              {/* Stacked Layer 3 (deepest) */}
                              <div style={{ position: 'absolute', bottom: '-10px', left: '12px', right: '12px', height: '20px', background: '#ffffff', border: '1px solid rgba(0, 0, 0, 0.05)', borderRadius: '20px', zIndex: -3, boxShadow: '0 4px 12px rgba(0,0,0,0.01)' }} />
                              {/* Stacked Layer 2 */}
                              <div style={{ position: 'absolute', bottom: '-5px', left: '6px', right: '6px', height: '20px', background: '#ffffff', border: '1px solid rgba(0, 0, 0, 0.05)', borderRadius: '20px', zIndex: -2, boxShadow: '0 4px 12px rgba(0,0,0,0.01)' }} />

                              {/* Main Content Box */}

                                background: '#ffffff',
                                border: '1px solid rgba(0,0,0,0.06)',
                                borderRadius: '20px',

                                position: 'relative',

                                  {tab.slides[slideIndices[tab.id]].description}

                              {/* Stacked Left Arrow */}
                              <button
                                onClick={() => handlePrevSlide(tab.id, tab.slides.length)}
                                style={{ position: 'absolute', left: '-16px', top: '50%', transform: 'translateY(-50%)', zIndex: 5, background: '#ffffff', border: '1px solid #e5e7eb', borderRadius: '8px', width: '32px', height: '32px', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', boxShadow: '0 2px 8px rgba(0,0,0,0.05)', color: '#000000' }}
                              >
                                <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                              </button>

                              {/* Stacked Right Arrow */}
                              <button
                                onClick={() => handleNextSlide(tab.id, tab.slides.length)}
                                style={{ position: 'absolute', right: '-16px', top: '50%', transform: 'translateY(-50%)', zIndex: 5, background: '#ffffff', border: '1px solid #e5e7eb', borderRadius: '8px', width: '32px', height: '32px', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', boxShadow: '0 2px 8px rgba(0,0,0,0.05)', color: '#000000' }}
                              >
                                <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                              </button>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              ) : (

                  {tabs.map((tab, idx) => {
                    const isActive = activeTab === idx;
                    return (
                      <div
                        key={tab.id}
                        onClick={!isActive ? () => setActiveTab(idx) : undefined}
